# Example: add a comment in your HRMS.API project
name: CI/CD - HRMS

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore "HRMS Backend/HRMS.API/HRMS.API.csproj"

    - name: Build
      run: dotnet build "HRMS Backend/HRMS.API/HRMS.API.csproj" --configuration Release

    - name: Publish
      run: dotnet publish "HRMS Backend/HRMS.API/HRMS.API.csproj" -c Release -o publish

    - name: Deploy to EC2 via PowerShell Remoting
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        password: ${{ secrets.EC2_PASS }}
        port: 5985
        script: |
          # Stop HRMS service
          & "C:\Users\Administrator\Documents\nssm-2.24\win64\nssm.exe" stop HRMS
          
          # Copy new files
          Copy-Item -Path ./publish/* -Destination "C:\Users\Administrator\Documents\Projects\PublishedApp\Publish" -Recurse -Force
          
          # Restart HRMS service
          & "C:\Users\Administrator\Documents\nssm-2.24\win64\nssm.exe" start HRMS
