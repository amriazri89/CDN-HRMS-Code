name: CI/CD - HRMS

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore "HRMS Backend/HRMS.API/HRMS.API.csproj"

    - name: Build
      run: dotnet build "HRMS Backend/HRMS.API/HRMS.API.csproj" --configuration Release

    - name: Publish
      run: dotnet publish "HRMS Backend/HRMS.API/HRMS.API.csproj" -c Release -o publish

    - name: Deploy to Windows EC2 via PowerShell Remoting
      shell: pwsh
      run: |
        $secpasswd = ConvertTo-SecureString "${{ secrets.EC2_PASS }}" -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential ("${{ secrets.EC2_USER }}", $secpasswd)
        
        Invoke-Command -ComputerName ${{ secrets.EC2_HOST }} -Credential $cred -ScriptBlock {
          Write-Host "Stopping HRMS service..."
          & "C:\Users\Administrator\Documents\nssm-2.24\win64\nssm.exe" stop HRMS

          Write-Host "Copying new published files..."
          Copy-Item -Path "C:\GitHub\Actions\publish\*" -Destination "C:\Users\Administrator\Documents\Projects\PublishedApp\Publish" -Recurse -Force

          Write-Host "Starting HRMS service..."
          & "C:\Users\Administrator\Documents\nssm-2.24\win64\nssm.exe" start HRMS
        }
